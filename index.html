        <!-- Preview para o Twitter/X ler a imagem corretamente -->
        <meta
            name="twitter:image"
            content="https://sorteio-curso-ti.vercel.app/preview-mb.png"
        />

        <!-- Título e texto -->
        <meta property="og:title" content="Sorteio do Mario" />
        <meta
            property="og:description"
            content="Participe no sorteio do curso de TI!"
        />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="as.png" />

        <title>Sorteio do Mario</title>
    </head>
    <body>
        <header class="cabecalho">
            <nav class="nav">
                <div class="logo">
                    <img src="" alt="" />
                    <p>Sorteador</p>
                </div>
                <div>
                    <p>criador</p>
                </div>
            </nav >
            <div >
                <h1 class="txt">Sorteie um <span>número</span>.</h1>
                <p>Defina o intervalo e descubra o resultado.</p>
            </div>
        </header>


        <main class="container">
            <section class="centro-meio">
                <div class="modo">
                    <p>MODO</p>
                    <div class="modo__options">
                        <label for="automatico">
                            <input type="radio" name="modo" id="automatico" checked />
                            <span>Automático</span>
                        </label>
                        <label for="manual">
                            <input type="radio" name="modo" id="manual" />
                            <span>Manual</span>
                        </label>
                    </div>
                    <p class="modo__ajuda" id="ajudaModo"></p>
                </div>

                <div class="intervalo">
                    <div>
                        <label for="minimo">Mínimo</label>
                        <input type="number" name="minimo" id="minimo" />
                    </div>
                    <div>
                        <label for="maximo">Máximo</label>
                        <input type="number" name="maximo" id="maximo" />
                    </div>
                </div>

                <div class="resultado">
                        <p>NUMERO SORTEADO</p>
                        <span id="resultado">?</span>
                </div>

                <div class="botao">
                    <button class="button-bg-base" id="comecar" type="button"></button>
                </div>
                <p class="dica" id="dica"></p>
                <div class="HISTORICO">
                    <p>HISTÓRICO</p>
                    <div id="historico" class="historico">
                      
                    </div>
                </div>
            </section>
        </main>

        <script src="script.js" defer></script>
