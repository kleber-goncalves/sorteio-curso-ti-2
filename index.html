<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <!-- Preview para do link -->
        <meta
            property="og:image"
            content="https://sorteio-curso-ti-2.vercel.app/preview-mb.png"
        />

        <!-- Preview para o Twitter/X ler a imagem corretamente -->
        <meta
            name="twitter:image"
            content="https://sorteio-curso-ti-2.vercel.app/preview-mb.png"
        />

        <!-- Título e texto -->
        <meta property="og:title" content="Sorteio II" />
        <meta
            property="og:description"
            content="Participe no sorteio do curso de TI!"
        />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="favicon-32x32.png" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="responsivo.css" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/lucide-static@latest/font/lucide.css"
        />

        <title>Sorteio II</title>
    </head>
    <body>
        <header class="cabecalho nao-selecionavel">
            <nav class="nav">
                <div class="logo">
                    <img src="" alt="" />
                    <p>Sorteador II</p>
                </div>
                <div class="criador" id="abrirModal">
                    <i class="criador-elements icon-user"></i>
                    <p class="criador-elements">Criador</p>
                </div>
            </nav>
            <div>
                <h1 class="txt">Sorteie um <span>número</span>.</h1>
            </div>
        </header>

        <main class="container nao-selecionavel">
            <section class="centro-meio">
                <div class="modo">
                    <p>MODO</p>
                    <div class="modo__options">
                        <label for="automatico">
                            <input
                                type="radio"
                                name="modo"
                                id="automatico"
                                checked
                            />
                            <i class="icon-zap"></i>
                            <span>Automático</span>
                        </label>
                        <label for="manual">
                            <input type="radio" name="modo" id="manual" />
                            <i class="icon-hand"></i>
                            <span>Manual</span>
                        </label>
                    </div>
                    <p class="modo__ajuda" id="ajudaModo"></p>
                </div>

                <div class="intervalo">
                    <div>
                        <label for="minimo">Mínimo</label>
                        <input
                            type="text"
                            inputmode="numeric"
                            name="minimo"
                            autocomplete="off"
                            id="minimo"
                        />
                    </div>
                    <div>
                        <label for="maximo">Máximo</label>
                        <input
                            type="text"
                            inputmode="numeric"
                            name="maximo"
                            autocomplete="off"
                            id="maximo"
                        />
                    </div>
                </div>

                <div class="resultado">
                    <!-- NÚMERO SORTEADO -->
                    <p class="resultado__rotulo">AGUARDANDO</p>
                    <span id="resultado" data-antigo="">?</span>
                </div>

                <div class="botao">
                    <button
                        class="button-bg-base"
                        id="comecar"
                        type="button"
                    ></button>
                </div>

                <p class="dica" id="dica"></p>

                <div class="HISTORICO">
                    <div class="HISTORICO__cabecalho">
                        <p>HISTÓRICO</p>
                        <button
                            class="button-limpar"
                            id="limparHistorico"
                            type="button"
                        >
                            <i class="icon-trash-2"></i>
                            LIMPAR HISTÓRICO
                        </button>
                    </div>

                    <div id="historico" class="historico"></div>
                </div>
            </section>
        </main>

        <!-- MODAL -->
        <dialog id="modal" class="nao-selecionavel">
            <div style="display: flex; justify-content: flex-end">
                <button id="fecharModal" type="button">X</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 46px">
                <div class="modal-cabecalho">
                    <img
                        id="modal-img"
                        src="https://github.com/kleber-goncalves.png"
                        alt=""
                    />
                    <h2 class="txts">Kleber Goncalves</h2>
                    <p class="txts">Criador do Sorteio</p>
                </div>

                <nav class="redes-sociais">
                    <a
                        href="https://www.linkedin.com/in/kleber-goncalve-s/"
                        target="_blank"
                        class="container-info__card"
                        id="linkedin"
                    >
                        <div class="container-info__content">
                            <div class="icons">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-linkedin h-4 w-4 text-muted-foreground group-hover:text-primary transition-colors"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
                                    ></path>
                                    <rect
                                        width="4"
                                        height="12"
                                        x="2"
                                        y="9"
                                    ></rect>
                                    <circle cx="4" cy="4" r="2"></circle>
                                </svg>
                            </div>
                            <div class="info">
                                <p>LinkedIn</p>
                                <span>in/kleber-goncalves-s</span>
                            </div>
                        </div>

                        <i class="icon-move-up-right"></i>
                    </a>
                    <a
                        href="https://www.instagram.com/kleber_goncalves.s/"
                        target="_blank"
                        class="container-info__card"
                        id="instagram"
                    >
                        <div class="container-info__content">
                            <div class="icons">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-instagram h-4 w-4 text-muted-foreground group-hover:text-primary transition-colors"
                                    aria-hidden="true"
                                >
                                    <rect
                                        width="20"
                                        height="20"
                                        x="2"
                                        y="2"
                                        rx="5"
                                        ry="5"
                                    ></rect>
                                    <path
                                        d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"
                                    ></path>
                                    <line
                                        x1="17.5"
                                        x2="17.51"
                                        y1="6.5"
                                        y2="6.5"
                                    ></line>
                                </svg>
                            </div>
                            <div class="info">
                                <p>Instagram</p>
                                <span>@kleber_goncalves.s</span>
                            </div>
                        </div>
                        <i class="icon-move-up-right"></i>
                    </a>
                    <a
                        href="https://github.com/kleber-goncalves"
                        target="_blank"
                        class="container-info__card"
                        id="github"
                    >
                        <div class="container-info__content">
                            <div class="icons">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="16"
                                    height="16"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-github h-4 w-4 text-muted-foreground group-hover:text-primary transition-colors"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
                                    ></path>
                                    <path d="M9 18c-4.51 2-5-2-7-2"></path>
                                </svg>
                            </div>
                            <div class="info">
                                <p>GitHub</p>
                                <span>kleber-goncalves</span>
                            </div>
                        </div>
                        <i class="icon-move-up-right"></i>
                    </a>
                </nav>
            </div>
        </dialog>

        <script src="script.js"></script>
    </body>
</html>
